name: Deploy Moh Agus CV

on:
    push:
        branches:
            - master

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to VPS
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_PORT }}

                  script: |
                      set -e
                      export DATABASE_URL="${{ secrets.DATABASE_URL }}"
                      export NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}"
                      export AUTH_GOOGLE_ID="${{ secrets.AUTH_GOOGLE_ID }}"
                      export AUTH_GOOGLE_SECRET="${{ secrets.AUTH_GOOGLE_SECRET }}"
                      export NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}"
                      export ADMIN_EMAILS="${{ secrets.ADMIN_EMAILS }}"
                      export MINIO_ENABLED="${{ secrets.MINIO_ENABLED }}"
                      export MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}"
                      export MINIO_PORT="${{ secrets.MINIO_PORT }}"
                      export MINIO_USE_SSL="${{ secrets.MINIO_USE_SSL }}"
                      export MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY }}"
                      export MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY }}"
                      export MINIO_BUCKET="${{ secrets.MINIO_BUCKET }}"
                      export MINIO_REGION="${{ secrets.MINIO_REGION }}"
                      export MINIO_AUTO_CREATE_BUCKET="${{ secrets.MINIO_AUTO_CREATE_BUCKET }}"
                      export MINIO_PROJECT_IMAGE_FOLDER="${{ secrets.MINIO_PROJECT_IMAGE_FOLDER }}"
                      export MINIO_PUBLIC_BASE_URL="${{ secrets.MINIO_PUBLIC_BASE_URL }}"
                      export MENU_IMAGE_MAX_BYTES="${{ secrets.MENU_IMAGE_MAX_BYTES }}"

                      echo "===== DEBUG ====="
                      whoami
                      echo $HOME
                      echo $PATH
                      which bun || true
                      /home/mohagus/.bun/bin/bun --version

                      echo "📂 Enter project directory"
                      cd /var/www/mycv

                      echo "⬇️ Pull latest code"
                      git fetch origin
                      git reset --hard origin/master

                      echo "📦 Install dependencies"
                      /home/mohagus/.bun/bin/bun install

                      echo "🗄️ Generate Prisma client"
                      /home/mohagus/.bun/bin/bun x prisma generate

                      echo "🗄️ Run database migrations"
                      /home/mohagus/.bun/bin/bun x prisma migrate deploy

                      echo "🌱 Seed database"
                      /home/mohagus/.bun/bin/bun run prisma:seed

                      echo "🏗️ Build project"
                      /home/mohagus/.bun/bin/bun run build

                      echo "🔄 Restart service"
                      sudo systemctl restart mycv

                      echo "✅ Check service status"
                      systemctl is-active mycv
